spring:
  application:
    name: url-short
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  datasource:
    # CQRS: 쓰기는 Primary, 읽기는 Replica로 라우팅. 로컬에선 둘 다 동일 DB를 가리켜도 무방하다.
    primary:
      url: ${APP_DATASOURCE_PRIMARY_URL:jdbc:mysql://localhost:3306/urlshort?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      username: ${APP_DATASOURCE_PRIMARY_USERNAME:urlshort}
      password: ${APP_DATASOURCE_PRIMARY_PASSWORD:urlshort}
    replica:
      url: ${APP_DATASOURCE_REPLICA_URL:jdbc:mysql://localhost:3306/urlshort?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      username: ${APP_DATASOURCE_REPLICA_USERNAME:urlshort}
      password: ${APP_DATASOURCE_REPLICA_PASSWORD:urlshort}
  cache:
    # L1(로컬 Caffeine) 사용 여부. 기본은 레이어드(L1 on). 벤치마크 시 런타임 토글(/actuator/l1cache)이나
    # 이 값을 false로 두면 Redis 단독(L2만) 모드로 동작한다.
    l1-enabled: ${APP_CACHE_L1_ENABLED:true}
    local-max-size: ${APP_CACHE_LOCAL_MAX_SIZE:10000}
    local-ttl: ${APP_CACHE_LOCAL_TTL:5m}
    l2-ttl: ${APP_CACHE_L2_TTL:1h}
    # 생성 직후 조회를 Replica 대신 캐시 히트로 흡수하기 위한 L2 선입력(Write-Through) TTL.
    # 짧게 두어 미조회 키의 캐시 오염을 막되, Replication Lag(p99 약 300ms)보다는 넉넉히 크게 잡는다.
    prime-ttl: ${APP_CACHE_PRIME_TTL:10s}
    # 선입력이 유실된 경우의 백스톱: 최근 Write 키를 짧은 TTL 동안 Primary로 라우팅해 404를 이중 차단한다.
    recent-write-ttl: ${APP_CACHE_RECENT_WRITE_TTL:2s}
  snowflake:
    datacenter-id: ${SNOWFLAKE_DATACENTER_ID:0}
    worker-id: ${SNOWFLAKE_WORKER_ID:0}
  url:
    ttl-days: ${APP_URL_TTL_DAYS:7}
    cleanup-cron: "${APP_URL_CLEANUP_CRON:0 0 * * * *}"

management:
  endpoints:
    web:
      exposure:
        # 벤치마크용: Prometheus 스크레이프 + L1 토글 + 무효화 전파 토글(검증용) 엔드포인트 노출
        include: health,info,prometheus,metrics,l1cache,invalidation
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: url-short
    distribution:
      # http_server_requests에 히스토그램 버킷을 붙여 Grafana에서 p50/p95/p99를 계산할 수 있게 한다.
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 1ms,5ms,10ms,25ms,50ms,100ms,250ms,500ms,1s

logging:
  level:
    org.hibernate.SQL: debug
